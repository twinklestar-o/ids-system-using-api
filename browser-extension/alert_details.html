<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Keamanan Morpheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --danger: #ff416c;
            --warning: #f7971e;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 24px;
        }

        .icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .title-group h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .badge-danger { background: rgba(255, 65, 108, 0.2); color: #ff416c; border: 1px solid rgba(255, 65, 108, 0.3); }
        .badge-warning { background: rgba(247, 151, 30, 0.2); color: #f7971e; border: 1px solid rgba(247, 151, 30, 0.3); }

        .content-section {
            margin-bottom: 32px;
        }

        .content-section h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .analysis-text {
            line-height: 1.8;
            color: #cbd5e1;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.2);
            padding: 24px;
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .mitigation-list {
            list-style: none;
            padding: 0;
        }

        .mitigation-item {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            gap: 16px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .mitigation-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .check-icon {
            color: var(--primary);
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
        }

        .btn-close {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🛡️</div>
            <div class="title-group">
                <h1>Analisis Keamanan Morpheus</h1>
                <div id="severity-badge" class="badge">Checking...</div>
            </div>
        </div>

        <div class="content-section">
            <h2>🔍 Apa yang Terjadi?</h2>
            <div id="analysis-content" class="analysis-text">
                Sedang memuat analisis dari AI...
            </div>
        </div>

        <div class="footer">
            <button id="close-btn" class="btn-close">Saya Mengerti</button>
        </div>
    </div>

    <script src="alert_details.js"></script>
</body>
</html>
