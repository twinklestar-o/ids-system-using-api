<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .active {
      background: #d4edda;
      padding: 10px;
      border-radius: 6px;
      color: #155724;
    }
  </style>
</head>
<body>
  <h3>Event Collector</h3>
  <div class="active">✓ Monitoring Active</div>
  <p style="font-size:12px;color:#666;">
    Browser telemetry is being collected and forwarded to Event Collector.
  </p>
  <button id="sync-btn" style="
    width: 100%;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
  ">Sync Alerts Now</button>
  <div id="status-msg" style="font-size:11px; color:#28a745; margin-top:5px; text-align:center; display:none;">Syncing...</div>
  <script src="popup.js"></script>
</body>
</html>
