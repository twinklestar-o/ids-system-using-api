<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Live Security Dashboard</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --danger: #ff4b2b;
            --warning: #f7971e;
            --success: #00b09b;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin: 10px 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .alert-feed {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .alert-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .alert-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .alert-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .severity-badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .sev-bahaya { background: rgba(255, 75, 43, 0.2); color: #ff4b2b; border: 1px solid #ff4b2b; }
        .sev-waspada { background: rgba(247, 151, 30, 0.2); color: #f7971e; border: 1px solid #f7971e; }
        .sev-info { background: rgba(0, 242, 254, 0.2); color: #00f2fe; border: 1px solid #00f2fe; }

        .block-tag {
            background: #ff4b2b;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .analysis-text {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 8px;
            line-height: 1.6;
        }

        .pulse {
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 0 rgba(0, 176, 155, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 176, 155, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 176, 155, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 176, 155, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🛡️ Morpheus IDS Dashboard</h1>
                <p><span class="pulse"></span> Live System Monitoring Active</p>
            </div>
            <div id="clock" style="font-size: 1.2rem; color: #94a3b8;"></div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Total Events</span>
                <span class="stat-value" id="count-total">0</span>
            </div>
            <div class="stat-card">
                <span>Threats Detected</span>
                <span class="stat-value" id="count-threats" style="color: var(--danger)">0</span>
            </div>
            <div class="stat-card">
                <span>Active Defense Blocks</span>
                <span class="stat-value" id="count-blocks" style="color: var(--warning)">0</span>
            </div>
        </div>

        <div class="alert-feed">
            <div class="alert-header">Recent Security Intelligence Feed</div>
            <div id="feed-root">
                <!-- Alerts will be injected here -->
                <div style="padding: 40px; text-align: center; color: #94a3b8;">
                    Menunggu serangan terdeteksi...
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchDashboard() {
            try {
                const res = await fetch('/dashboard-data');
                const data = await res.json();
                
                document.getElementById('count-total').innerText = data.stats.total;
                document.getElementById('count-threats').innerText = data.stats.threats;
                document.getElementById('count-blocks').innerText = data.stats.blocks;

                const root = document.getElementById('feed-root');
                if (data.alerts.length === 0) return;

                root.innerHTML = data.alerts.map(a => {
                    const rawAnalysis = (a.analysis || "No analysis available.").replace(/["*#]/g, "");
                    
                    function extractSection(text, tag) {
                        const regex = new RegExp(`${tag}:?\\s*([\\s\\S]+?)(?=\\s*\\[|\\s*$|\\s*[A-Z_]{5,}\\]|$)`, "i");
                        const match = text.match(regex);
                        return match ? match[1].trim() : null;
                    }

                    // Extract concise mitigation for dashboard feed
                    const mitigation = extractSection(rawAnalysis, "RINGKASAN_SINGKAT") || extractSection(rawAnalysis, "RINGKASAN_MITIGASI") || "Memantau aktivitas sistem.";

                    const severityLabel = a.severity_label || "[INFO]";
                    const severityClass = severityLabel.toLowerCase().replace(/\[|\]/g, '').trim();
                    const timestamp = a.timestamp ? new Date(a.timestamp).toLocaleTimeString() : "N/A";
                    
                    return `
                    <div class="alert-item" style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 15px;">
                        <div style="margin-bottom: 10px;">
                            <span class="severity-badge sev-${severityClass}">${severityLabel}</span>
                            ${a.block_instruction ? '<span class="block-tag" style="background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 10px;">SYSTEM BLOCKED</span>' : ''}
                        </div>
                        <div style="flex: 1">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <strong style="color: #cbd5e1; font-size: 1rem;">Event: ${a.event_id || 'N/A'}</strong>
                                <small style="color: #64748b;">${timestamp}</small>
                            </div>
                            <div class="analysis-text" style="color: #4facfe; font-size: 0.95rem; line-height: 1.4;">
                                <span style="color: #64748b; font-size: 0.8rem;">Mitigasi:</span> ${mitigasi}
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(fetchDashboard, 2000);
        fetchDashboard();
    </script>
</body>
</html>
